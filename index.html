<!-- PetCarePlus — Final Single-file HTML (Home updated: Products + Responsive fixes) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PetCarePlus — Smart & Stylish Pet Care</title>
  <meta name="description" content="PetCarePlus: Expert advice, lifestyle tips, and health guides for your furry friends." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7faf9;--card:#fff;--muted:#6b7280;--accent:#10b981;--accent-700:#059669;--dark:#0f172a;--glass:rgba(255,255,255,0.6);--shadow:0 12px 30px rgba(12,18,29,0.06)
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:var(--dark);background:linear-gradient(180deg,#f7fbf9 0%, #ffffff 100%)}
    a{color:var(--accent);text-decoration:none}
    .wrap{min-height:100vh;display:flex;flex-direction:column}
    header{background:linear-gradient(90deg,var(--accent),var(--accent-700));color:white;padding:14px 0;box-shadow:var(--shadow)}
    .nav{width:min(1100px,94%);margin:0 auto;display:flex;align-items:center;gap:12px;justify-content:space-between}
    .brand{font-weight:700;font-size:1.25rem;display:flex;gap:8px;align-items:center}
    .nav-links{display:flex;gap:12px;align-items:center}
    .nav-links a{color:white;padding:8px 12px;border-radius:8px;font-weight:600;opacity:0.95}
    .nav-links a:hover{opacity:1;background:rgba(255,255,255,0.06)}
    main{width:min(1100px,94%);margin:32px auto;flex:1}

    /* HERO */
    .hero{display:grid;grid-template-columns:1fr 460px;gap:26px;align-items:center;background:linear-gradient(180deg, rgba(16,185,129,0.06), rgba(255,255,255,0.7));padding:34px;border-radius:16px;box-shadow:var(--shadow)}
    .hero h1{font-size:2.1rem;margin:0 0 8px;color:#064e3b}
    .hero p{color:var(--muted);margin:0 0 18px}
    .cta-row{display:flex;gap:12px;flex-wrap:wrap}
    .btn{background:var(--accent);color:white;padding:12px 16px;border-radius:10px;font-weight:700;border:0;cursor:pointer}
    .btn.ghost{background:transparent;color:var(--dark);border:2px solid rgba(12,18,29,0.06)}
    .hero-img{width:100%;height:100%;border-radius:12px;object-fit:cover;box-shadow:0 18px 40px rgba(5,150,105,0.08)}

    /* features */
    .features{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:26px}
    .feature{background:var(--card);padding:18px;border-radius:12px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start}
    .feature-icon{width:56px;height:56px;border-radius:10px;background:linear-gradient(180deg,var(--accent),var(--accent-700));display:flex;align-items:center;justify-content:center;color:white;font-weight:700}
    .feature h3{margin:0 0 6px}
    .feature p{margin:0;color:var(--muted)}

    /* products */
    .products-wrap{margin-top:36px}
    .products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .product{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
    .product img{width:100%;height:160px;object-fit:cover}
    .product-body{padding:12px;flex:1;display:flex;flex-direction:column}
    .product-title{font-weight:700;margin:0 0 6px;font-size:0.98rem}
    .product-price{color:#065f46;font-weight:700;margin-top:auto}
    .product-actions{display:flex;gap:8px;margin-top:10px}
    .btn-sm{padding:8px 10px;border-radius:8px;font-weight:700;border:0;cursor:pointer}
    .buy{background:#ff9900;color:#111}
    .wish{background:#eef2f7;color:var(--dark)}

    /* blog */
    .section-title{text-align:center;font-size:1.5rem;color:#064e3b;margin:48px 0 18px}
    .blogs{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .post{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
    .post img{width:100%;height:170px;object-fit:cover}
    .post-body{padding:14px;flex:1}
    .post-body h4{margin:0 0 6px}
    .post-body p{margin:0;color:var(--muted)}
    .post-footer{padding:12px 14px;border-top:1px solid #f1f5f9;background:#fafafa;display:flex;justify-content:space-between;align-items:center}

    /* pages */
    .card{background:var(--card);padding:18px;border-radius:12px;box-shadow:var(--shadow)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .tips .tip{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
    .num{background:var(--accent);color:white;padding:10px 12px;border-radius:10px;font-weight:700;min-width:44px;text-align:center}
    form{display:grid;gap:12px}
    label{font-size:13px;color:var(--muted)}
    input,textarea{padding:10px;border-radius:10px;border:1px solid #eef2f7;font-size:15px;width:100%;outline:none}
    textarea{min-height:120px;resize:vertical}

    footer{background:#0b1220;color:#cbd5e1;padding:28px 0;margin-top:36px}
    .footer-inner{width:min(1100px,94%);margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
    .small{font-size:13px;color:#94a3b8}

    /* responsive fixes */
    @media (max-width:1100px){.products-grid{grid-template-columns:repeat(3,1fr)}.blogs{grid-template-columns:repeat(2,1fr)}.features{grid-template-columns:repeat(2,1fr)}.hero{grid-template-columns:1fr 360px}}
    @media (max-width:760px){.nav{padding:0 8px}.hero{grid-template-columns:1fr;gap:14px}.hero-right{order:2}.products-grid{grid-template-columns:repeat(2,1fr)}.blogs{grid-template-columns:1fr}.features{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}footer .footer-inner{grid-template-columns:1fr}.hero h1{font-size:1.6rem}}
    @media (max-width:420px){.products-grid{grid-template-columns:1fr}.product img{height:200px}}
    .center{text-align:center}
  </style>
</head>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const app = document.getElementById('app');

    const products = [
      {id:1,title:'Comfort Travel Carrier (Small)',price:'₹2,299',img:'https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=800&q=60',amazon:'https://www.amazon.in/s?k=pet+carrier'},
      {id:2,title:'Slow Feeder Bowl',price:'$45',img:'https://images.unsplash.com/photo-1598136497045-1f8a7a8a8f4b?auto=format&fit=crop&w=800&q=60',amazon:'https://www.amazon.in/s?k=slow+feeder+bowl+for+dogs'},
      {id:3,title:'Deshedding Brush',price:'$99',img:'https://images.unsplash.com/photo-1559599189-7a4c9a2f7f7a?auto=format&fit=crop&w=800&q=60',amazon:'https://www.amazon.in/s?k=deshedding+tool'},
      {id:4,title:'Pet First Aid Kit',price:'$199',img:'https://images.unsplash.com/photo-1583337130417-7b2f1b0d7a4c?auto=format&fit=crop&w=800&q=60',amazon:'https://www.amazon.in/s?k=pet+first+aid+kit'}
    ];

    const posts = [
      {id:1,title:'How to choose the right food',date:'Jan 10, 2025',img:'https://images.unsplash.com/photo-1555685812-4b943f1cb0eb?auto=format&fit=crop&w=1200&q=80',excerpt:'Decode labels and pick the right diet for your pet’s life stage.'},
      {id:2,title:'DIY grooming at home',date:'Mar 18, 2025',img:'https://plus.unsplash.com/premium_photo-1663012822996-ba7e04f3627a?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D',excerpt:'Grooming basics: brushing, bathing and nail care done right.'},
      {id:3,title:'Traveling with pets',date:'Jun 05, 2025',img:'https://images.unsplash.com/photo-1525253086316-d0c936c814f8?auto=format&fit=crop&w=1200&q=80',excerpt:'Checklist and tips for safe, calm travel with your pet.'}
    ];

    const routes = {
      '/': renderHome,
      '/tips': renderTips,
      '/blogs': renderBlogs,
      '/blogs/1': () => renderBlogDetail(1),
      '/blogs/2': () => renderBlogDetail(2),
      '/blogs/3': () => renderBlogDetail(3),
      '/contact': renderContact,
      '/privacy': renderPrivacy,
      '/terms': renderTerms,
      '/disclaimer': renderDisclaimer
    };

    function highlightNav(path){
      const links = document.querySelectorAll('#top-links a');
      links.forEach(a => {
        const href = a.getAttribute('href') || '#/';
        a.style.opacity = (href === '#'+path) ? '1' : '0.92';
        a.style.background = (href === '#'+path) ? 'rgba(255,255,255,0.06)' : 'transparent';
      });
    }

    function router(){
      const path = location.hash.replace('#','') || '/';
      const fn = routes[path] || (() => {
        if(path.startsWith('/blogs/')){
          const id = Number(path.split('/').pop()); if(id) return renderBlogDetail(id);
        }
        renderNotFound();
      });
      fn(); highlightNav(path); window.scrollTo({top:0,behavior:'smooth'});
    }

    /* PAGES */
    function renderHome(){
      app.innerHTML = `
        <section class="hero" aria-label="Welcome">
          <div class="hero-left">
            <h1>Your pet’s happiness starts here</h1>
            <p class="muted">Practical, vet-reviewed tips for nutrition, grooming, play and travel — written for busy pet parents.</p>
            <div class="cta-row">
              <a class="btn" href="#/tips">Top Tips</a>
              <a class="btn ghost" href="#/blogs">Read our blog</a>
            </div>
            <div style="margin-top:18px;color:var(--muted);font-size:0.95rem;">
              <strong>Quick facts:</strong>
              <ul style="margin:8px 0 0 18px;color:var(--muted)">
                <li>20–30 min daily play helps behavior & health</li>
                <li>Measure portions — prevent obesity</li>
                <li>Routine grooming prevents skin & ear problems</li>
              </ul>
            </div>
          </div>
          <div class="hero-right">
            <picture>
              <source media="(max-width:760px)" srcset="https://images.unsplash.com/photo-1558788353-f76d92427f16?auto=format&fit=crop&w=600&q=80">
              <img class="hero-img" src="https://images.unsplash.com/photo-1558788353-f76d92427f16?auto=format&fit=crop&w=1000&q=80" alt="Happy dog and cat">
            </picture>
          </div>
        </section>

        <h2 class="section-title">Pet Care Highlights</h2>
        <section class="features" aria-label="Highlights">
          <div class="feature"><div class="feature-icon">🥗</div><div><h3>Healthy Feeding</h3><p>How to read labels, manage portions, and choose life-stage nutrition for puppies, adults and seniors.</p></div></div>
          <div class="feature"><div class="feature-icon">✂️</div><div><h3>Grooming & Hygiene</h3><p>Brushing, bathing frequency and nail care to keep skin and coat healthy.</p></div></div>
          <div class="feature"><div class="feature-icon">⚽</div><div><h3>Exercise & Play</h3><p>Play ideas, training tips and mental stimulation for happier pets.</p></div></div>
        </section>

       

        <h2 class="section-title">From the Blog</h2>
        <section class="blogs" aria-label="Latest posts">
          ${posts.map(p => `
            <article class="post">
              <img src="${p.img}" alt="${p.title}">
              <div class="post-body"><h4>${p.title}</h4><p class="muted">${p.date} • ${p.excerpt}</p></div>
              <div class="post-footer"><div class="small muted">${p.date}</div><a href="#/blogs/${p.id}">Read →</a></div>
            </article>
          `).join('')}
        </section>
      `;
    }

    function renderTips(){
      app.innerHTML = `
        <div class="card tips">
          <h2>Top 3 Practical Tips</h2>
          <div style="margin-top:14px">
            <div class="tip"><div class="num">1</div><div><h3>Create a consistent feeding routine</h3><p class="muted">Feed at set times, measure portions, and avoid table scraps. Track portions for 2–3 weeks to find the right baseline for weight control.</p></div></div>
            <div class="tip"><div class="num">2</div><div><h3>Daily exercise & mental stimulation</h3><p class="muted">Short walks, puzzle feeders, and 10–15 minute training sessions reduce boredom and behaviour issues.</p></div></div>
            <div class="tip"><div class="num">3</div><div><h3>Grooming & preventive care</h3><p class="muted">Brush regularly, trim nails, clean ears and follow parasite prevention and vaccination schedules recommended by your vet.</p></div></div>
          </div>
        </div>
      `;
    }

    function renderBlogs(){
      app.innerHTML = `
        <div>
          <h2 class="section-title">All Blog Posts</h2>
          <div class="blogs">
            ${posts.map(p => `
              <article class="post">
                <img src="${p.img}" alt="${p.title}">
                <div class="post-body"><h4>${p.title}</h4><p class="muted">${p.date} • ${p.excerpt}</p></div>
                <div class="post-footer"><div class="small muted">${p.date}</div><a href="#/blogs/${p.id}">Read →</a></div>
              </article>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderBlogDetail(id){
      const p = posts.find(x=>x.id===id);
      if(!p){ renderNotFound(); return; }
      let body='';
      if(id===1){ body = `<article class="card">
  <h1>How to Choose the Right Food for Your Pet</h1>

  <p>
    Picking the right food for your dog or cat can feel confusing &mdash; so many brands,
    flavours, labels and &ldquo;premium&rdquo; tags everywhere. The good news: if you follow a few simple rules,
    you can quickly narrow down the best options for your pet.
  </p>

  <p>
    This guide walks you through step by step: life stage, ingredients, portion size, special health
    needs, and how to safely switch foods.
  </p>

  <p><strong>Important:</strong> This article is for general guidance only. Always talk to your veterinarian before making big diet changes, especially if your pet has any medical issues.</p>

  <h2>1. Start with your pet&rsquo;s basics</h2>

  <p>Before even looking at a bag or can, note down a few key details about your pet:</p>

  <ul>
    <li><strong>Species:</strong> Dog or cat (never feed dog food to cats long-term; cats need extra nutrients like taurine).</li>
    <li><strong>Age / life stage:</strong>
      <ul>
        <li>Puppy / kitten</li>
        <li>Adult</li>
        <li>Senior</li>
      </ul>
    </li>
    <li><strong>Size &amp; breed:</strong> Small, medium, large or giant breed (larger breeds often have special joint and growth needs).</li>
    <li><strong>Activity level:</strong> Couch potato, average, or super active.</li>
    <li><strong>Current body condition:</strong> Underweight, ideal, or overweight.</li>
  </ul>

  <p>
    All of this helps you choose the right life-stage and type of food and the right portion size.
  </p>

  <h2>2. Choose the correct life-stage formula</h2>

  <p>Pet foods are usually labelled with one of these:</p>

  <ul>
    <li><strong>Puppy / Kitten</strong> &mdash; higher calories and nutrients to support fast growth.</li>
    <li><strong>Adult maintenance</strong> &mdash; balanced for pets that are fully grown.</li>
    <li><strong>Senior / 7+ years</strong> &mdash; lower calories, extra support for joints, kidneys, digestion (depending on brand).</li>
    <li><strong>All life stages</strong> &mdash; designed to meet growth and adult needs, but might be too calorie-dense for some adult or senior pets.</li>
  </ul>

  <p><strong>Simple rule:</strong></p>
  <p>
    If your pet is still growing, pick <em>puppy/kitten</em> or <em>all life stages</em>.<br>
    If fully grown and healthy, go for <em>adult</em>.<br>
    If older or with age-related issues, ask your vet about <em>senior</em> or special diets.
  </p>

  <h2>3. Learn to read the ingredient list</h2>

  <p>The ingredient list can look scary, but you don&rsquo;t need to be a scientist to get the basics right.</p>

  <h3>Look for:</h3>
  <ul>
    <li>
      <strong>Named animal proteins near the top</strong><br>
      e.g. &ldquo;chicken&rdquo;, &ldquo;salmon&rdquo;, &ldquo;turkey&rdquo;, &ldquo;lamb&rdquo;.
      Better than vague terms like &ldquo;meat&rdquo; or &ldquo;animal by-product&rdquo; alone.
    </li>
    <li>
      <strong>Clear fat sources</strong><br>
      e.g. &ldquo;chicken fat&rdquo;, &ldquo;salmon oil&rdquo; &mdash; important for energy, skin and coat health.
    </li>
    <li>
      <strong>Digestible carbs &amp; fibre</strong><br>
      e.g. rice, oats, sweet potato, peas, beet pulp (for fibre).
    </li>
  </ul>

  <h3>Be cautious of:</h3>
  <ul>
    <li>
      <strong>Very long lists of artificial colours and unnecessary flavourings</strong> &mdash;
      not always harmful, but not needed for health.
    </li>
    <li>
      <strong>Sugar / sweeteners</strong> &mdash; avoid foods that add sugar, corn syrup or similar just to improve taste.
    </li>
    <li>
      <strong>Vague by-products</strong> &mdash; some by-products are okay and nutritious, but if you see only
      &ldquo;meat by-products&rdquo; without any clear meat listed, it&rsquo;s a small red flag.
    </li>
  </ul>

  <p>
    You don&rsquo;t have to buy the most expensive brand, but you do want clear, named ingredients and a list
    that doesn&rsquo;t look like a chemistry experiment.
  </p>

  <h2>4. Check the guaranteed analysis &amp; calories</h2>

  <p>
    Every pet food has a small table called <strong>&ldquo;Guaranteed Analysis&rdquo;</strong> showing protein, fat, fibre, moisture, etc.
  </p>

  <p>For most healthy adult dogs and cats:</p>
  <ul>
    <li><strong>Protein:</strong> should be reasonable for their species and life stage (cats generally need more).</li>
    <li><strong>Fat:</strong> gives energy and flavour; too much can cause weight gain if portions are not controlled.</li>
    <li><strong>Fibre:</strong> helps digestion &mdash; too much can cause loose stool or too many poop trips.</li>
  </ul>

  <p>Also look for:</p>
  <ul>
    <li><strong>Calories per cup / per 100g</strong> &mdash; very important for portion control.</li>
    <li><strong>Feeding guide</strong> &mdash; usually on the back/side of the pack.</li>
  </ul>

  <p>
    You&rsquo;ll use calories + the feeding guide as a starting point. Later, you adjust slightly up or down based on your pet&rsquo;s weight and energy.
  </p>

  <h2>5. Consider special health needs</h2>

  <p>
    Some pets shouldn&rsquo;t eat &ldquo;normal&rdquo; food. They might need a prescription or special diet recommended by a vet.
  </p>

  <ul>
    <li><strong>Allergies / sensitivities</strong> &mdash; your vet may suggest a limited-ingredient diet or a food with novel protein (like duck, venison, etc.).</li>
    <li><strong>Kidney or liver disease</strong> &mdash; often requires a specific veterinary diet with controlled protein, phosphorus, sodium, etc.</li>
    <li><strong>Joint issues / arthritis</strong> &mdash; some foods include added joint-support ingredients (glucosamine, chondroitin, omega-3s).</li>
    <li><strong>Weight management</strong> &mdash; &ldquo;light&rdquo;, &ldquo;weight management&rdquo; or prescription weight-loss foods may be needed, plus exercise.</li>
  </ul>

  <p><strong>Never</strong> switch a pet with a known medical problem to a new food without checking with your vet first.</p>

  <h2>6. Dry, wet, or a mix?</h2>

  <p>All three can be fine if the food quality is good and the diet is balanced:</p>

  <ul>
    <li><strong>Dry food (kibble):</strong> Convenient, usually cheaper, easy to store. Helps some pets with dental health but not a replacement for brushing.</li>
    <li><strong>Wet food (cans/pouches):</strong> Higher moisture, often more palatable for picky eaters. Good for pets that need more water (like some cats).</li>
    <li><strong>Mixed feeding:</strong> Common approach: a base of dry food with some wet food on top for flavour and variety.</li>
  </ul>

  <p>
    For cats especially, adding wet food can help increase water intake, which supports urinary health. Ask your vet what ratio makes sense for your pet.
  </p>

  <h2>7. How to safely switch foods</h2>

  <p>Changing food too quickly can cause vomiting, diarrhoea or refusal to eat. Instead, switch gradually:</p>

  <ol>
    <li><strong>Days 1–2:</strong> 75% old food, 25% new food.</li>
    <li><strong>Days 3–4:</strong> 50% old food, 50% new food.</li>
    <li><strong>Days 5–6:</strong> 25% old food, 75% new food.</li>
    <li><strong>Day 7 onwards:</strong> 100% new food (if all is going well).</li>
  </ol>

  <p>
    If your pet develops loose stool, vomiting or becomes very gassy, slow the transition down or call your vet
    for advice, especially if your pet is very young, very small, or has other health issues.
  </p>

  <h2>8. Monitor your pet after the switch</h2>

  <p>Once your pet has fully switched to the new food, keep an eye on:</p>

  <ul>
    <li><strong>Energy:</strong> Still playful and active? Or suddenly very tired?</li>
    <li><strong>Coat &amp; skin:</strong> Shiny coat, minimal dandruff? Or new itchiness and redness?</li>
    <li><strong>Stool:</strong> Firm but not hard, easy to pick up.</li>
    <li><strong>Weight:</strong> Check every few weeks if possible.</li>
  </ul>

  <p>
    Small changes are normal at first, but anything extreme or long-lasting (diarrhoea, vomiting, refusing food,
    visible discomfort) is a reason to call the vet.
  </p>

  <h2>9. Don&rsquo;t forget water &amp; treats</h2>

  <p>
